<body>
    <div id="root"><div class="loading"><div class="spinner"></div><p style="font-weight: 600; font-size: 1rem;">Loading My Legacy...</p></div></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // LOGO PATH - Change this to match your uploaded logo filename
        const LOGO_PATH = "mylegacylogo.png";  // ← EDIT THIS LINE with your logo filename
        
        const CURRENCIES = { 
            'GBP': { symbol: '£', name: 'British Pound', flag: '🇬🇧', enabled: true },
            'USD': { symbol: '$', name: 'US Dollar (Coming Soon)', flag: '🇺🇸', enabled: false }, 
            'EUR': { symbol: '€', name: 'Euro (Coming Soon)', flag: '🇪🇺', enabled: false }, 
            'SAR': { symbol: 'SR', name: 'Saudi Riyal (Coming Soon)', flag: '🇸🇦', enabled: false }, 
            'AED': { symbol: 'AED', name: 'UAE Dirham (Coming Soon)', flag: '🇦🇪', enabled: false } 
        };
        const MADHABS = [{ value: 'hanafi', name: 'Hanafi', description: 'Most widespread' }, { value: 'maliki', name: 'Maliki', description: 'North Africa' }, { value: 'shafii', name: "Shafi'i", description: 'Southeast Asia' }, { value: 'hanbali', name: 'Hanbali', description: 'Arabian Peninsula' }];
        const JURISDICTIONS = [
            { value: 'england-wales', name: 'England & Wales', country: '🇬🇧', enabled: true }, 
            { value: 'scotland', name: 'Scotland (Coming Soon)', country: '🇬🇧', enabled: false }, 
            { value: 'usa', name: 'United States (Coming Soon)', country: '🇺🇸', enabled: false }, 
            { value: 'canada', name: 'Canada (Coming Soon)', country: '🇨🇦', enabled: false }, 
            { value: 'australia', name: 'Australia (Coming Soon)', country: '🇦🇺', enabled: false }
        ];
        const MARITAL_STATUS = [{ value: '', label: 'Select...' }, { value: 'single', label: 'Single' }, { value: 'married', label: 'Married' }, { value: 'divorced', label: 'Divorced' }, { value: 'widowed', label: 'Widowed' }];
        const BURIAL_PREFS = [{ value: 'muslim-cemetery', label: 'Muslim Cemetery' }, { value: 'islamic-section', label: 'Islamic Section of Cemetery' }, { value: 'family-plot', label: 'Family Plot' }, { value: 'specific', label: 'Specific Location' }];
        const RELATIONSHIPS = [{ value: 'self', label: 'Self' }, { value: 'spouse', label: 'Spouse' }, { value: 'child', label: 'Child' }, { value: 'mother', label: 'Mother' }, { value: 'father', label: 'Father' }, { value: 'sibling', label: 'Sibling' }, { value: 'other', label: 'Other Family' }];
        

        // ── CRYPTO UTILITIES (Web Crypto API — no external libraries) ─────────────
        const ML_SALT_KEY  = 'ml_salt';
        const ML_DATA_KEY  = 'ml_enc';
        const ML_READY_KEY = 'ml_ready';

        const buf2b64 = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
        const b642buf = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));

        async function deriveCryptoKey(password, salt) {
            const km = await crypto.subtle.importKey(
                'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
            );
            return crypto.subtle.deriveKey(
                { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
                km, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
            );
        }

        async function encryptBlob(key, obj) {
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const ct = await crypto.subtle.encrypt(
                { name: 'AES-GCM', iv }, key,
                new TextEncoder().encode(JSON.stringify(obj))
            );
            return { iv: buf2b64(iv.buffer), ct: buf2b64(ct) };
        }

        async function decryptBlob(key, enc) {
            const pt = await crypto.subtle.decrypt(
                { name: 'AES-GCM', iv: b642buf(enc.iv) }, key, b642buf(enc.ct)
            );
            return JSON.parse(new TextDecoder().decode(pt));
        }

        async function saveEncrypted(key, data) {
            const enc = await encryptBlob(key, data);
            localStorage.setItem(ML_DATA_KEY, JSON.stringify(enc));
        }

        const EMPTY_DATA = {
            profiles: [],
            settings: { madhab: 'hanafi', currency: 'GBP', jurisdiction: 'england-wales' },
            darkMode: false, willsData: {}, calcData: {}
        };

        // ── PIN GATE COMPONENT ────────────────────────────────────────────────────
        function PinGate({ onAuth }) {
            const [phase, setPhase] = useState('loading');
            const [pin, setPin]     = useState('');
            const [conf, setConf]   = useState('');
            const [error, setError] = useState('');
            const [busy, setBusy]   = useState(false);
            const [showReset, setShowReset] = useState(false);
            const pinRef = useRef(null);

            useEffect(() => {
                const isReady = localStorage.getItem(ML_READY_KEY);
                setPhase(isReady ? 'login' : 'setup');
                setTimeout(() => pinRef.current && pinRef.current.focus(), 150);
            }, []);

            const doSetup = async () => {
                if (pin.length < 4) return setError('Password must be at least 4 characters');
                if (pin !== conf)    return setError('Passwords do not match');
                setBusy(true); setError('');
                try {
                    const salt = crypto.getRandomValues(new Uint8Array(16));
                    localStorage.setItem(ML_SALT_KEY, buf2b64(salt.buffer));
                    const key = await deriveCryptoKey(pin, salt);
                    await saveEncrypted(key, EMPTY_DATA);
                    localStorage.setItem(ML_READY_KEY, '1');
                    onAuth(key, EMPTY_DATA);
                } catch(e) { setError('Setup failed. Please try again.'); setBusy(false); }
            };

            const doLogin = async () => {
                if (!pin) return setError('Please enter your password');
                setBusy(true); setError('');
                try {
                    const salt = b642buf(localStorage.getItem(ML_SALT_KEY));
                    const key  = await deriveCryptoKey(pin, salt);
                    const enc  = JSON.parse(localStorage.getItem(ML_DATA_KEY));
                    const data = await decryptBlob(key, enc);
                    onAuth(key, { ...EMPTY_DATA, ...data });
                } catch(e) { setError('Incorrect password. Please try again.'); setBusy(false); setPin(''); }
            };

            const doReset = () => {
                if (!confirm('⚠️ This will PERMANENTLY DELETE all your My Legacy data. This cannot be undone.\n\nAre you absolutely sure?')) return;
                if (!confirm('Last chance — delete everything and start over?')) return;
                localStorage.clear();
                window.location.reload();
            };

            const onKey = e => { if (e.key === 'Enter') phase === 'setup' ? doSetup() : doLogin(); };

            const card = { background: 'white', borderRadius: '1.5rem', padding: '2.5rem 2rem', width: '100%', maxWidth: '380px', boxShadow: '0 25px 50px rgba(0,0,0,0.3)' };
            const inp  = (extra) => ({ width: '100%', padding: '0.875rem 1rem', border: '2px solid ' + (error ? '#ff3b30' : '#d1d5db'), borderRadius: '0.75rem', fontSize: '1rem', boxSizing: 'border-box', outline: 'none', ...extra });
            const btn  = (bg, disabled) => ({ width: '100%', padding: '0.875rem', background: disabled ? '#9ca3af' : bg, color: 'white', border: 'none', borderRadius: '0.75rem', fontSize: '1rem', fontWeight: 700, cursor: disabled ? 'not-allowed' : 'pointer', marginBottom: '0.75rem', transition: 'opacity 0.2s' });

            if (phase === 'loading') return (
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: '100vh', background: '#0d9488' }}>
                    <div style={{ color: 'white', fontSize: '1.25rem', fontWeight: 600 }}>⏳ Loading...</div>
                </div>
            );

            return (
                <div style={{ minHeight: '100vh', background: 'linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #134e4a 100%)', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '1rem' }}>
                    <div style={card}>
                        <div style={{ textAlign: 'center', marginBottom: '1.75rem' }}>
                            <div style={{ fontSize: '1.3rem', color: '#0d9488', fontFamily: 'Georgia, serif', marginBottom: '0.5rem' }}>بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
                            <img src={LOGO_PATH} alt="My Legacy" style={{ width: '180px', maxWidth: '80%', marginBottom: '0.5rem', display: 'block', margin: '0 auto 0.5rem' }} />
                            <p style={{ color: '#6b7280', fontSize: '0.85rem', margin: 0 }}>Islamic Estate Planner</p>
                        </div>

                        <h2 style={{ color: '#1f2937', fontSize: '1.05rem', fontWeight: 700, textAlign: 'center', marginBottom: '0.5rem' }}>
                            {phase === 'setup' ? '🔐 Create Your Password' : '🔒 Welcome Back'}
                        </h2>
                        <p style={{ color: '#6b7280', fontSize: '0.8rem', textAlign: 'center', marginBottom: '1.25rem', lineHeight: 1.6 }}>
                            {phase === 'setup'
                                ? 'Your data is encrypted with your password. Choose carefully — forgotten passwords cannot be recovered.'
                                : 'Enter your password to decrypt and access your estate planning data.'}
                        </p>

                        <div style={{ marginBottom: '0.875rem' }}>
                            <label style={{ display: 'block', fontWeight: 600, fontSize: '0.85rem', color: '#374151', marginBottom: '0.4rem' }}>
                                {phase === 'setup' ? 'Create Password' : 'Password'}
                            </label>
                            <input ref={pinRef} type='password' value={pin} onChange={e => setPin(e.target.value)} onKeyDown={onKey}
                                placeholder={phase === 'setup' ? 'Minimum 4 characters' : 'Enter your password'}
                                style={inp()} autoComplete={phase === 'setup' ? 'new-password' : 'current-password'} />
                        </div>

                        {phase === 'setup' && (
                            <div style={{ marginBottom: '0.875rem' }}>
                                <label style={{ display: 'block', fontWeight: 600, fontSize: '0.85rem', color: '#374151', marginBottom: '0.4rem' }}>Confirm Password</label>
                                <input type='password' value={conf} onChange={e => setConf(e.target.value)} onKeyDown={onKey}
                                    placeholder='Repeat password' style={inp()} autoComplete='new-password' />
                            </div>
                        )}

                        {error && (
                            <div style={{ background: '#fef2f2', border: '1px solid #fca5a5', borderRadius: '0.5rem', padding: '0.6rem 0.875rem', marginBottom: '0.875rem' }}>
                                <p style={{ color: '#dc2626', fontSize: '0.85rem', margin: 0 }}>⚠️ {error}</p>
                            </div>
                        )}

                        <button onClick={phase === 'setup' ? doSetup : doLogin} disabled={busy} style={btn('linear-gradient(135deg, #0d9488, #0f766e)', busy)}>
                            {busy ? '⏳ Processing…' : (phase === 'setup' ? '🔐 Create Password & Start' : '🔓 Unlock My Legacy')}
                        </button>

                        {phase === 'setup' && (
                            <div style={{ background: '#fffbeb', border: '1px solid #fcd34d', borderRadius: '0.75rem', padding: '0.875rem', fontSize: '0.8rem', color: '#92400e', lineHeight: 1.6 }}>
                                ⚠️ <strong>Important:</strong> Your data will be encrypted with AES-256. If you forget your password, your data <strong>cannot be recovered</strong>. Please store it safely.
                            </div>
                        )}

                        {phase === 'login' && (
                            <div style={{ textAlign: 'center', marginTop: '0.5rem' }}>
                                {!showReset ? (
                                    <button onClick={() => setShowReset(true)} style={{ background: 'none', border: 'none', color: '#6b7280', fontSize: '0.8rem', cursor: 'pointer', textDecoration: 'underline' }}>
                                        Forgot password?
                                    </button>
                                ) : (
                                    <div style={{ background: '#fef2f2', border: '1px solid #fca5a5', borderRadius: '0.75rem', padding: '0.875rem', marginTop: '0.5rem' }}>
                                        <p style={{ color: '#dc2626', fontSize: '0.8rem', margin: '0 0 0.75rem', lineHeight: 1.5 }}>
                                            ⚠️ <strong>No password recovery is possible.</strong> Resetting will delete all your data permanently.
                                        </p>
                                        <button onClick={doReset} style={{ background: '#dc2626', color: 'white', border: 'none', borderRadius: '0.5rem', padding: '0.5rem 1rem', fontSize: '0.85rem', fontWeight: 700, cursor: 'pointer', marginRight: '0.5rem' }}>Delete Everything</button>
                                        <button onClick={() => setShowReset(false)} style={{ background: '#e5e7eb', color: '#374151', border: 'none', borderRadius: '0.5rem', padding: '0.5rem 1rem', fontSize: '0.85rem', fontWeight: 600, cursor: 'pointer' }}>Cancel</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // ── APP WRAPPER ───────────────────────────────────────────────────────────
        function App() {
            const [session, setSession] = useState(null);
            if (!session) return <PinGate onAuth={(key, data) => setSession({ key, data })} />;
            return <MyLegacy
                cryptoKey={session.key}
                initialData={session.data}
                onNewKey={newKey => setSession(prev => ({ ...prev, key: newKey }))}
            />;
        }


        const FormField = ({ label, value, onChange, type = 'text', required, options, placeholder, helpText, t }) => {
            const c = t || { text: '#1d1d1f', textSec: '#86868b', surface: '#fff', border: '#e5e5ea' };
            return (
                <div style={{ marginBottom: '1.5rem' }}>
                    <label style={{ color: c.text }}>{label} {required && <span style={{ color: '#ff3b30' }}>*</span>}</label>
                    {helpText && <p style={{ color: c.textSec, fontSize: '0.75rem', marginBottom: '0.5rem' }}>{helpText}</p>}
                    {type === 'select' ? (
                        <select value={value} onChange={onChange} style={{ background: c.surface, color: c.text, borderColor: c.border }}>
                            {options && options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
                        </select>
                    ) : type === 'textarea' ? (
                        <textarea value={value} onChange={onChange} rows={4} placeholder={placeholder} style={{ background: c.surface, color: c.text, borderColor: c.border }} />
                    ) : (
                        <input type={type} value={value} onChange={onChange} placeholder={placeholder} style={{ background: c.surface, color: c.text, borderColor: c.border }} />
                    )}
                </div>
            );
        };

        function WillCreator({ willData, setWillData, willStep, setWillStep, selectedProfile, theme, settings, saveWillForProfile }) {
            const _t = { text: theme.text, textSec: theme.textSec, surface: theme.surface, border: theme.border };
            useEffect(() => { if (selectedProfile && saveWillForProfile) saveWillForProfile(selectedProfile.id, willData); }, [JSON.stringify(willData)]);
                const canvasRef = useRef(null);
                const [isDrawing, setIsDrawing] = useState(false);
                const [currentSig, setCurrentSig] = useState(null);
                
                const getCoordinates = (e) => {
                    const canvas = canvasRef.current;
                    if (!canvas) return { x: 0, y: 0 };
                    const rect = canvas.getBoundingClientRect();
                    const scaleX = canvas.width / rect.width;
                    const scaleY = canvas.height / rect.height;
                    if (e.touches && e.touches.length > 0) {
                        return { x: (e.touches[0].clientX - rect.left) * scaleX, y: (e.touches[0].clientY - rect.top) * scaleY };
                    }
                    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
                };
                
                const startDraw = (e) => {
                    e.preventDefault();
                    setIsDrawing(true);
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    const coords = getCoordinates(e);
                    ctx.lineWidth = 2;
                    ctx.lineCap = 'round';
                    ctx.strokeStyle = '#000';
                    ctx.beginPath();
                    ctx.moveTo(coords.x, coords.y);
                };
                
                const draw = (e) => {
                    e.preventDefault();
                    if (!isDrawing) return;
                    const canvas = canvasRef.current;
                    const ctx = canvas.getContext('2d');
                    const coords = getCoordinates(e);
                    ctx.lineTo(coords.x, coords.y);
                    ctx.stroke();
                };
                
                const endDraw = (e) => { e.preventDefault(); setIsDrawing(false); };
                const clearSig = () => { const canvas = canvasRef.current; const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); };
                const saveSig = () => {
                    const sig = canvasRef.current.toDataURL();
                    setWillData(prev => {
                        const newSigs = JSON.parse(JSON.stringify(prev.signatures));
                        if (currentSig === 'testator') newSigs.testator = sig;
                        else if (currentSig === 'witness1') newSigs.witness1.sig = sig;
                        else if (currentSig === 'witness2') newSigs.witness2.sig = sig;
                        return {...prev, signatures: newSigs};
                    });
                    setCurrentSig(null);
                };
                
                const printWill = () => {
                    const today = new Date().toLocaleDateString('en-GB');
                    const w = window.open('', '_blank');
                    w.document.write(`
                        <html>
                        <head>
                            <title>Islamic Will - ${willData.personal.fullName}</title>
                            <style>
                                body { font-family: 'Times New Roman', serif; max-width: 800px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; color: #000; }
                                h1 { text-align: center; font-size: 24px; margin-bottom: 10px; border-bottom: 3px solid #0d9488; padding-bottom: 10px; }
                                h2 { color: #0d9488; font-size: 18px; margin-top: 30px; margin-bottom: 15px; border-bottom: 2px solid #0d9488; padding-bottom: 5px; }
                                h3 { color: #000; font-size: 14px; margin-top: 20px; margin-bottom: 10px; }
                                p { margin: 8px 0; font-size: 12px; }
                                .declaration { background: #f0fdf4; padding: 15px; border-left: 4px solid #0d9488; margin: 20px 0; font-style: italic; }
                                .sig-box { border: 2px solid #000; padding: 15px; margin: 20px 0; min-height: 120px; page-break-inside: avoid; }
                                .sig-box img { max-width: 250px; max-height: 100px; display: block; margin: 10px 0; }
                                .sig-line { border-bottom: 1px solid #000; display: inline-block; min-width: 200px; margin-left: 10px; }
                                .section { margin-bottom: 25px; page-break-inside: avoid; }
                                .list-item { margin-left: 20px; margin-bottom: 8px; }
                                .footer { margin-top: 40px; padding-top: 20px; border-top: 2px solid #000; text-align: center; font-size: 10px; color: #666; }
                                .page-break { page-break-after: always; }
                                @media print { body { padding: 20px; } }
                            </style>
                        </head>
                        <body>
                            <h1>LAST WILL AND TESTAMENT</h1>
                            <p style="text-align: center; font-style: italic; margin-bottom: 30px;">In the Name of Allah, the Most Gracious, the Most Merciful</p>
                            
                            <div class="section">
                                <h2>REVOCATION OF PREVIOUS WILLS</h2>
                                <p>I, <strong>${willData.personal.fullName}</strong>, hereby revoke all former Wills, Codicils and testamentary dispositions made by me and declare this to be my Last Will and Testament.</p>
                            </div>

                            <div class="section">
                                <h2>PERSONAL DETAILS</h2>
                                <p><strong>Full Name:</strong> ${willData.personal.fullName}</p>
                                <p><strong>Date of Birth:</strong> ${willData.personal.dob}</p>
                                <p><strong>Address:</strong> ${willData.personal.address}, ${willData.personal.postcode}</p>
                                ${willData.personal.nationalId ? `<p><strong>National ID/Passport:</strong> ${willData.personal.nationalId}</p>` : ''}
                                <p><strong>Marital Status:</strong> ${willData.personal.maritalStatus}</p>
                            </div>

                            <div class="section">
                                <h2>DECLARATION OF FAITH (SHAHADA)</h2>
                                <div class="declaration">
                                    <p>${willData.islamic.shahada}</p>
                                    <p>أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّٰهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ ٱللَّٰهِ</p>
                                </div>
                            </div>

                            <div class="section">
                                <h2>ISLAMIC COMPLIANCE DECLARATION</h2>
                                <p>I declare that I am of sound mind and make this Will in full accordance with Islamic law (Shariah) and the principles of the <strong>${MADHABS.find(m => m.value === settings.madhab)?.name} madhab</strong>.</p>
                                <p>I request and direct that my estate be distributed according to the Islamic law of inheritance (Faraid) after:</p>
                                <div class="list-item">1. Payment of my funeral expenses</div>
                                <div class="list-item">2. Settlement of all lawful debts</div>
                                <div class="list-item">3. Distribution of any lawful bequests (Wasiyyah) not exceeding one-third of my estate</div>
                                <div class="list-item">4. Any Waqf (charitable endowment) as specified below</div>
                            </div>

                            ${Object.values(willData.islamic.obligations).some(v => v) ? `
                            <div class="section">
                                <h2>OUTSTANDING ISLAMIC OBLIGATIONS</h2>
                                ${willData.islamic.obligations.hajj ? `<p><strong>Hajj:</strong> ${willData.islamic.obligations.hajjDetails || 'To be performed on my behalf'}</p>` : ''}
                                ${willData.islamic.obligations.zakah ? `<p><strong>Zakah:</strong> ${willData.islamic.obligations.zakahDetails || 'To be calculated and paid from my estate'}</p>` : ''}
                                ${willData.islamic.obligations.qard ? `<p><strong>Qard (Debts):</strong> ${willData.islamic.obligations.qardDetails}</p>` : ''}
                                ${willData.islamic.obligations.kaffarah ? `<p><strong>Kaffarah (Expiations):</strong> ${willData.islamic.obligations.kaffarahDetails}</p>` : ''}
                                ${willData.islamic.obligations.other ? `<p><strong>Other Obligations:</strong> ${willData.islamic.obligations.other}</p>` : ''}
                                <p><em>I direct my executors to ensure these obligations are fulfilled from my estate before distribution.</em></p>
                            </div>
                            ` : ''}

                            <div class="section">
                                <h2>FUNERAL AND BURIAL WISHES</h2>
                                <p><strong>Burial Preference:</strong> ${BURIAL_PREFS.find(b => b.value === willData.islamic.burial)?.label}</p>
                                ${willData.islamic.burialLocation ? `<p><strong>Specific Location:</strong> ${willData.islamic.burialLocation}</p>` : ''}
                                <p><strong>Shroud (Kafan):</strong> ${willData.islamic.shroud}</p>
                                <p><strong>Timeline:</strong> ${willData.islamic.timeline}</p>
                                <p><strong>Janazah Prayer:</strong> ${willData.islamic.janazah}</p>
                                ${willData.islamic.notes ? `<p><strong>Additional Instructions:</strong> ${willData.islamic.notes}</p>` : ''}
                                <p><em>I request that my burial be conducted in accordance with Islamic tradition, avoiding cremation and excessive expenditure.</em></p>
                            </div>

                            <div class="section">
                                <h2>APPOINTMENT OF EXECUTORS</h2>
                                <p>I appoint the following person(s) as Executor(s) and Trustee(s) of this Will:</p>
                                ${willData.executors.map((e, i) => `
                                    <div class="list-item">
                                        <p><strong>Executor ${i + 1}:</strong> ${e.name}</p>
                                        <p><strong>Relationship:</strong> ${e.relationship}</p>
                                        <p><strong>Contact:</strong> ${e.contact}</p>
                                    </div>
                                `).join('')}
                                ${willData.executors.length === 0 ? '<p><em>No executors appointed</em></p>' : ''}
                            </div>

                            ${willData.guardians.length > 0 ? `
                            <div class="section">
                                <h2>APPOINTMENT OF GUARDIANS</h2>
                                <p>In the event of my death while my children are minors, I appoint the following as Guardian(s):</p>
                                ${willData.guardians.map((g, i) => `
                                    <div class="list-item">
                                        <p><strong>Guardian ${i + 1}:</strong> ${g.name}</p>
                                        <p><strong>Relationship:</strong> ${g.relationship}</p>
                                    </div>
                                `).join('')}
                            </div>
                            ` : ''}

                            ${willData.arbiters.length > 0 ? `
                            <div class="section">
                                <h2>APPOINTMENT OF ARBITERS (ISLAMIC SCHOLARS)</h2>
                                <p>In the event of any dispute regarding the interpretation of Islamic law or the distribution of my estate according to Faraid, I appoint the following Islamic scholar(s) as Arbiter(s):</p>
                                ${willData.arbiters.map((a, i) => `
                                    <div class="list-item">
                                        <p><strong>Arbiter ${i + 1}:</strong> ${a.name}</p>
                                        <p><strong>Qualification:</strong> ${a.qualification}</p>
                                        <p><strong>Institution:</strong> ${a.institution}</p>
                                        <p><strong>Contact:</strong> ${a.contact}</p>
                                    </div>
                                `).join('')}
                                <p><em>The decision of the appointed Arbiter(s) shall be final in matters of Islamic law and Faraid calculation.</em></p>
                            </div>
                            ` : ''}

                            ${willData.wasiyyah.enabled ? `
                            <div class="section">
                                <h2>BEQUESTS (WASIYYAH)</h2>
                                <p>In accordance with Islamic law, I make the following bequest(s) not exceeding one-third of my estate:</p>
                                <p><strong>Amount/Percentage:</strong> ${willData.wasiyyah.amount}</p>
                                <p><strong>Beneficiary:</strong> ${willData.wasiyyah.beneficiary}</p>
                                <p><strong>Purpose:</strong> ${willData.wasiyyah.purpose}</p>
                                <p><em>This bequest is subject to the consent of my Islamic inheritors as required by Shariah.</em></p>
                            </div>
                            ` : ''}

                            ${willData.waqf.enabled ? `
                            <div class="section">
                                <h2>WAQF (CHARITABLE ENDOWMENT)</h2>
                                <p>I establish the following Waqf as a perpetual charitable endowment:</p>
                                <p><strong>Amount/Asset:</strong> ${willData.waqf.amount}</p>
                                <p><strong>Purpose:</strong> ${willData.waqf.purpose}</p>
                                <p><strong>Beneficiaries:</strong> ${willData.waqf.beneficiaries}</p>
                                <p><em>This Waqf shall be administered in perpetuity for the stated purpose, with income distributed to the named beneficiaries.</em></p>
                            </div>
                            ` : ''}

                            <div class="section">
                                <h2>DISTRIBUTION OF RESIDUAL ESTATE</h2>
                                <p>Subject to the payment of debts, funeral expenses, and any lawful bequests, I direct that the remainder of my estate be distributed among my lawful Islamic inheritors in accordance with the rules of Faraid as prescribed in the Quran and Sunnah, following the <strong>${MADHABS.find(m => m.value === settings.madhab)?.name} madhab</strong>.</p>
                                <p><em>The exact distribution shall be calculated by my Executors in consultation with qualified Islamic scholars, taking into account all living heirs at the time of my death.</em></p>
                            </div>

                            <div class="page-break"></div>

                            <div class="section">
                                <h2>SIGNATURES AND WITNESSES</h2>
                                
                                <div class="sig-box">
                                    <h3>TESTATOR</h3>
                                    <p>I, <strong>${willData.personal.fullName}</strong>, declare this to be my Last Will and Testament, made freely and voluntarily.</p>
                                    ${willData.signatures.testator ? `<img src="${willData.signatures.testator}" alt="Testator Signature" />` : '<div style="height: 80px;"></div>'}
                                    <p>Signature: <span class="sig-line"></span></p>
                                    <p>Date: <span class="sig-line">${today}</span></p>
                                </div>

                                <div class="sig-box">
                                    <h3>WITNESS 1</h3>
                                    <p><strong>Name:</strong> ${willData.signatures.witness1.name || '_________________________'}</p>
                                    <p><strong>Address:</strong> ${willData.signatures.witness1.address || '_________________________'}</p>
                                    ${willData.signatures.witness1.sig ? `<img src="${willData.signatures.witness1.sig}" alt="Witness 1 Signature" />` : '<div style="height: 80px;"></div>'}
                                    <p>Signature: <span class="sig-line"></span></p>
                                    <p>Date: <span class="sig-line">${today}</span></p>
                                </div>

                                <div class="sig-box">
                                    <h3>WITNESS 2</h3>
                                    <p><strong>Name:</strong> ${willData.signatures.witness2.name || '_________________________'}</p>
                                    <p><strong>Address:</strong> ${willData.signatures.witness2.address || '_________________________'}</p>
                                    ${willData.signatures.witness2.sig ? `<img src="${willData.signatures.witness2.sig}" alt="Witness 2 Signature" />` : '<div style="height: 80px;"></div>'}
                                    <p>Signature: <span class="sig-line"></span></p>
                                    <p>Date: <span class="sig-line">${today}</span></p>
                                </div>
                            </div>

                            <div class="footer">
                                <p>This Islamic Will was created using My Legacy - Islamic Estate Planner</p>
                                <p>Document created on: ${today}</p>
                                <p><em>This is a legal document. Keep it in a safe place and inform your executors of its location.</em></p>
                            </div>
                        </body>
                        </html>
                    `);
                    w.document.close();
                    setTimeout(() => w.print(), 500);
                };
                
                return (
                    <div style={{ minHeight: '100vh', background: theme.bg, padding: '1.5rem 1rem' }}>
                        <div style={{ maxWidth: '42rem', margin: '0 auto' }}>
                            {selectedProfile && (
                                <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1rem', marginBottom: '1rem', boxShadow: theme.shadow }}>
                                    <p style={{ color: theme.textSec, fontSize: '0.875rem' }}>Creating will for: <strong style={{ color: theme.text }}>{selectedProfile.name}</strong> ({RELATIONSHIPS.find(r => r.value === selectedProfile.relationship)?.label})</p>
                                </div>
                            )}
                            <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.5rem', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                                <div style={{ display: 'flex', gap: '0.5rem', marginBottom: '1.5rem', overflowX: 'auto' }}>
                                    {[1,2,3,4,5,6].map(s => (
                                        <div key={s} style={{ flex: '0 0 auto', width: '3rem', height: '3rem', borderRadius: '50%', background: s === willStep ? theme.gradient : theme.border, color: s === willStep ? 'white' : theme.textSec, display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 600, cursor: s < willStep ? 'pointer' : 'default' }} onClick={() => s < willStep && setWillStep(s)}>{s}</div>
                                    ))}
                                </div>
                                
                                {willStep === 1 && (
                                    <div>
                                        <h2 style={{ color: theme.text, marginBottom: '1.5rem' }}>Personal Details</h2>
                                        <FormField label="Full Legal Name" value={willData.personal.fullName} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, fullName: e.target.value}}))} required  t={_t}/>
                                        <FormField label="Date of Birth" type="date" value={willData.personal.dob} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, dob: e.target.value}}))} required  t={_t}/>
                                        <FormField label="Full Address" value={willData.personal.address} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, address: e.target.value}}))} required  t={_t}/>
                                        <FormField label="Postcode" value={willData.personal.postcode} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, postcode: e.target.value}}))} required  t={_t}/>
                                        <FormField label="National ID / Passport Number" value={willData.personal.nationalId} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, nationalId: e.target.value}}))} helpText="Optional but recommended for identification"  t={_t}/>
                                        <FormField label="Marital Status" type="select" value={willData.personal.maritalStatus} onChange={e => setWillData(prev => ({...prev, personal: {...prev.personal, maritalStatus: e.target.value}}))} options={MARITAL_STATUS} required  t={_t}/>
                                    </div>
                                )}
                                
                                {willStep === 2 && (
                                    <div>
                                        <h2 style={{ color: theme.text, marginBottom: '1.5rem' }}>Islamic Declarations & Obligations</h2>
                                        
                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1.5rem' }}>
                                            <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 600, marginBottom: '0.5rem' }}>Declaration of Faith (Shahada)</h3>
                                            <p style={{ color: theme.text, fontSize: '0.875rem', lineHeight: 1.6, fontStyle: 'italic' }}>{willData.islamic.shahada}</p>
                                            <p style={{ color: theme.text, fontSize: '1rem', lineHeight: 1.6, marginTop: '0.5rem', direction: 'rtl' }}>أَشْهَدُ أَنْ لَا إِلَٰهَ إِلَّا ٱللَّٰهُ وَأَشْهَدُ أَنَّ مُحَمَّدًا رَسُولُ ٱللَّٰهِ</p>
                                        </div>

                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1.5rem' }}>
                                            <p style={{ color: theme.text, fontSize: '0.875rem', lineHeight: 1.6 }}>I declare that I am of sound mind and make this will in accordance with Islamic law and Shariah principles. I request that my estate be distributed according to Faraid after settling debts and obligations, and up to one-third for wasiyyah if specified.</p>
                                        </div>

                                        <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem' }}>Outstanding Islamic Obligations</h3>
                                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1rem' }}>Select any outstanding obligations that should be fulfilled from your estate:</p>
                                        
                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', marginBottom: '0.75rem' }}>
                                                <input type="checkbox" checked={willData.islamic.obligations.hajj} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, hajj: e.target.checked}}}))} style={{ width: 'auto' }} />
                                                <span style={{ color: theme.text, fontWeight: 600 }}>Outstanding Hajj</span>
                                            </label>
                                            {willData.islamic.obligations.hajj && <FormField label="Details" value={willData.islamic.obligations.hajjDetails} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, hajjDetails: e.target.value}}}))} placeholder="e.g., To be performed on my behalf by a trustworthy person"  t={_t}/>}
                                        </div>

                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', marginBottom: '0.75rem' }}>
                                                <input type="checkbox" checked={willData.islamic.obligations.zakah} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, zakah: e.target.checked}}}))} style={{ width: 'auto' }} />
                                                <span style={{ color: theme.text, fontWeight: 600 }}>Outstanding Zakah</span>
                                            </label>
                                            {willData.islamic.obligations.zakah && <FormField label="Details" value={willData.islamic.obligations.zakahDetails} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, zakahDetails: e.target.value}}}))} placeholder="e.g., Calculate and pay from estate for past 2 years"  t={_t}/>}
                                        </div>

                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', marginBottom: '0.75rem' }}>
                                                <input type="checkbox" checked={willData.islamic.obligations.qard} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, qard: e.target.checked}}}))} style={{ width: 'auto' }} />
                                                <span style={{ color: theme.text, fontWeight: 600 }}>Qard (Debts Owed)</span>
                                            </label>
                                            {willData.islamic.obligations.qard && <FormField label="Details" value={willData.islamic.obligations.qardDetails} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, qardDetails: e.target.value}}}))} placeholder="e.g., £5000 owed to [Name], to be repaid from estate"  t={_t}/>}
                                        </div>

                                        <div style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                            <label style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', cursor: 'pointer', marginBottom: '0.75rem' }}>
                                                <input type="checkbox" checked={willData.islamic.obligations.kaffarah} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, kaffarah: e.target.checked}}}))} style={{ width: 'auto' }} />
                                                <span style={{ color: theme.text, fontWeight: 600 }}>Kaffarah (Expiations)</span>
                                            </label>
                                            {willData.islamic.obligations.kaffarah && <FormField label="Details" value={willData.islamic.obligations.kaffarahDetails} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, kaffarahDetails: e.target.value}}}))} placeholder="e.g., Feed 60 poor people for broken oath"  t={_t}/>}
                                        </div>

                                        <FormField label="Other Obligations" type="textarea" value={willData.islamic.obligations.other} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, obligations: {...prev.islamic.obligations, other: e.target.value}}}))} placeholder="Any other Islamic obligations to be fulfilled from your estate"  t={_t}/>

                                        <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem', marginTop: '2rem' }}>Funeral & Burial Wishes</h3>
                                        
                                        <FormField label="Burial Preference" type="select" value={willData.islamic.burial} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, burial: e.target.value}}))} options={BURIAL_PREFS} required  t={_t}/>
                                        
                                        {willData.islamic.burial === 'specific' && <FormField label="Specific Burial Location" value={willData.islamic.burialLocation} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, burialLocation: e.target.value}}))} placeholder="Enter specific cemetery or location"  t={_t}/>}
                                        
                                        <FormField label="Additional Funeral Instructions" type="textarea" value={willData.islamic.notes} onChange={e => setWillData(prev => ({...prev, islamic: {...prev.islamic, notes: e.target.value}}))} placeholder="Any specific burial, funeral, or janazah instructions..."  t={_t}/>
                                    </div>
                                )}
                                
                                {willStep === 3 && (
                                    <div>
                                        <h2 style={{ color: theme.text, marginBottom: '1.5rem' }}>Executors, Guardians & Arbiters</h2>
                                        
                                        <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem' }}>Executors</h3>
                                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1rem' }}>Choose trustworthy individuals to manage your estate. Recommended: 2-4 executors.</p>
                                        {willData.executors.map((ex, i) => (
                                            <div key={i} style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                                <FormField label="Name" value={ex.name} onChange={e => { const val = e.target.value; setWillData(prev => { const newEx = prev.executors.map((x,idx) => idx===i ? {...x, name: val} : x); return {...prev, executors: newEx}; }); }}  t={_t}/>
                                                <FormField label="Relationship" value={ex.relationship} onChange={e => { const val = e.target.value; setWillData(prev => { const newEx = prev.executors.map((x,idx) => idx===i ? {...x, relationship: val} : x); return {...prev, executors: newEx}; }); }}  t={_t}/>
                                                <FormField label="Contact Details" value={ex.contact} onChange={e => { const val = e.target.value; setWillData(prev => { const newEx = prev.executors.map((x,idx) => idx===i ? {...x, contact: val} : x); return {...prev, executors: newEx}; }); }} placeholder="Phone and/or email"  t={_t}/>
                                                <button onClick={() => setWillData(prev => ({...prev, executors: prev.executors.filter((_, idx) => idx !== i)}))} style={{ background: '#ff3b30', color: 'white', border: 'none', padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem' }}>Remove</button>
                                            </div>
                                        ))}
                                        <button onClick={() => setWillData(prev => ({...prev, executors: [...prev.executors, {name: '', relationship: '', contact: ''}]}))} style={{ background: theme.primary, color: 'white', border: 'none', padding: '0.75rem 1.5rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem', fontWeight: 600, width: '100%', marginBottom: '2rem' }}>+ Add Executor</button>
                                        
                                        <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem' }}>Guardians (for minor children)</h3>
                                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1rem' }}>Only needed if you have children under 18. Skip if not applicable.</p>
                                        {willData.guardians.map((g, i) => (
                                            <div key={i} style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                                <FormField label="Name" value={g.name} onChange={e => { const val = e.target.value; setWillData(prev => { const newG = prev.guardians.map((x,idx) => idx===i ? {...x, name: val} : x); return {...prev, guardians: newG}; }); }}  t={_t}/>
                                                <FormField label="Relationship" value={g.relationship} onChange={e => { const val = e.target.value; setWillData(prev => { const newG = prev.guardians.map((x,idx) => idx===i ? {...x, relationship: val} : x); return {...prev, guardians: newG}; }); }}  t={_t}/>
                                                <button onClick={() => setWillData(prev => ({...prev, guardians: prev.guardians.filter((_, idx) => idx !== i)}))} style={{ background: '#ff3b30', color: 'white', border: 'none', padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem' }}>Remove</button>
                                            </div>
                                        ))}
                                        <button onClick={() => setWillData(prev => ({...prev, guardians: [...prev.guardians, {name: '', relationship: ''}]}))} style={{ background: theme.primary, color: 'white', border: 'none', padding: '0.75rem 1.5rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem', fontWeight: 600, width: '100%', marginBottom: '2rem' }}>+ Add Guardian</button>
                                        
                                        <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem' }}>Arbiters (Islamic Scholars)</h3>
                                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1rem' }}>Appoint 1-2 Islamic scholars to resolve any disputes about Faraid distribution or Islamic law interpretation.</p>
                                        {willData.arbiters.map((a, i) => (
                                            <div key={i} style={{ background: theme.bg, padding: '1rem', borderRadius: '0.5rem', marginBottom: '1rem' }}>
                                                <FormField label="Scholar Name" value={a.name} onChange={e => { const val = e.target.value; setWillData(prev => { const newA = prev.arbiters.map((x,idx) => idx===i ? {...x, name: val} : x); return {...prev, arbiters: newA}; }); }}  t={_t}/>
                                                <FormField label="Qualification" value={a.qualification} onChange={e => { const val = e.target.value; setWillData(prev => { const newA = prev.arbiters.map((x,idx) => idx===i ? {...x, qualification: val} : x); return {...prev, arbiters: newA}; }); }} placeholder="e.g., Mufti, Alim, Sheikh"  t={_t}/>
                                                <FormField label="Institution/Mosque" value={a.institution} onChange={e => { const val = e.target.value; setWillData(prev => { const newA = prev.arbiters.map((x,idx) => idx===i ? {...x, institution: val} : x); return {...prev, arbiters: newA}; }); }} placeholder="e.g., Al-Azhar, Local Islamic Center"  t={_t}/>
                                                <FormField label="Contact Details" value={a.contact} onChange={e => { const val = e.target.value; setWillData(prev => { const newA = prev.arbiters.map((x,idx) => idx===i ? {...x, contact: val} : x); return {...prev, arbiters: newA}; }); }} placeholder="Phone and/or email"  t={_t}/>
                                                <button onClick={() => setWillData(prev => ({...prev, arbiters: prev.arbiters.filter((_, idx) => idx !== i)}))} style={{ background: '#ff3b30', color: 'white', border: 'none', padding: '0.5rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem' }}>Remove</button>
                                            </div>
                                        ))}
                                        <button onClick={() => setWillData(prev => ({...prev, arbiters: [...prev.arbiters, {name: '', qualification: '', institution: '', contact: ''}]}))} style={{ background: theme.primary, color: 'white', border: 'none', padding: '0.75rem 1.5rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem', fontWeight: 600, width: '100%' }}>+ Add Arbiter</button>
                                    </div>
                                )}
