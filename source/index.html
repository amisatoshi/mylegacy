        const calculateFaraid = (heirs, netEstate, madhab) => {
            if (netEstate <= 0) return null;
            const { spouseExists, spouseType, sons, daughters, fatherAlive, motherAlive, grandfatherAlive, grandmotherAlive, fullBrothers, fullSisters, paternalBrothers, paternalSisters } = heirs;
            const hasChildren = sons > 0 || daughters > 0;
            const hasSons = sons > 0;
            const totalSiblings = fullBrothers + fullSisters + paternalBrothers + paternalSisters;
            const shares = {};
            let fixedSharesTotal = 0;

            if (spouseExists) {
                const spouseShare = spouseType === 'wife' ? (hasChildren ? 1/8 : 1/4) : (hasChildren ? 1/4 : 1/2);
                shares.spouse = { fraction: spouseShare, label: spouseType === 'wife' ? 'Wife' : 'Husband', count: 1 };
                fixedSharesTotal += spouseShare;
            }
            if (motherAlive) {
                const motherShare = (hasChildren || totalSiblings >= 2) ? 1/6 : 1/3;
                shares.mother = { fraction: motherShare, label: 'Mother', count: 1 };
                fixedSharesTotal += motherShare;
            }
            if (fatherAlive) {
                if (hasChildren) {
                    shares.father = { fraction: 1/6, label: 'Father', count: 1, plusResidual: !hasSons };
                    fixedSharesTotal += 1/6;
                } else {
                    shares.father = { fraction: 0, label: 'Father', count: 1, isAsabah: true };
                }
            }
            if (grandfatherAlive && !fatherAlive) {
                if (hasChildren) {
                    shares.grandfather = { fraction: 1/6, label: 'Grandfather', count: 1 };
                    fixedSharesTotal += 1/6;
                } else {
                    shares.grandfather = { fraction: 0, label: 'Grandfather', count: 1, isAsabah: true };
                }
            }
            if (grandmotherAlive && !motherAlive) {
                shares.grandmother = { fraction: 1/6, label: 'Grandmother', count: 1 };
                fixedSharesTotal += 1/6;
            }
            if (daughters > 0 && !hasSons) {
                const dShare = daughters === 1 ? 1/2 : 2/3;
                shares.daughters = { fraction: dShare, label: daughters === 1 ? 'Daughter' : 'Daughters (' + daughters + ')', count: daughters };
                fixedSharesTotal += dShare;
            }
            const siblingsActive = !hasChildren && !fatherAlive && !grandfatherAlive;
            if (siblingsActive) {
                const allBrothers = fullBrothers + paternalBrothers;
                const allSisters = fullSisters + paternalSisters;
                if (allBrothers === 0 && allSisters > 0) {
                    const sisShare = allSisters === 1 ? 1/2 : 2/3;
                    shares.sisters = { fraction: sisShare, label: allSisters === 1 ? 'Sister' : 'Sisters (' + allSisters + ')', count: allSisters };
                    fixedSharesTotal += sisShare;
                }
            }

            let residual = Math.max(0, netEstate * (1 - fixedSharesTotal));

            if (hasSons) {
                const totalUnits = sons * 2 + daughters;
                shares.sons = { amount: residual * (sons * 2) / totalUnits, label: sons === 1 ? 'Son' : 'Sons (' + sons + ')', count: sons, isAsabah: true };
                if (daughters > 0) {
                    shares.daughters = { amount: residual * daughters / totalUnits, label: daughters === 1 ? 'Daughter' : 'Daughters (' + daughters + ')', count: daughters, isAsabah: true };
                }
                residual = 0;
            } else if (fatherAlive && shares.father && !shares.father.isAsabah) {
                shares.father.amount = (netEstate / 6) + residual;
                residual = 0;
            } else if (fatherAlive && shares.father && shares.father.isAsabah) {
                shares.father.amount = residual;
                residual = 0;
            } else if (grandfatherAlive && !fatherAlive && shares.grandfather && shares.grandfather.isAsabah) {
                shares.grandfather.amount = residual;
                residual = 0;
            } else if (siblingsActive) {
                const allBrothers = fullBrothers + paternalBrothers;
                const allSisters = fullSisters + paternalSisters;
                if (allBrothers > 0) {
                    const units = allBrothers * 2 + allSisters;
                    shares.brothers = { amount: residual * (allBrothers * 2) / Math.max(units, 1), label: allBrothers === 1 ? 'Brother' : 'Brothers (' + allBrothers + ')', count: allBrothers, isAsabah: true };
                    if (allSisters > 0) {
                        shares.sisters = { amount: residual * allSisters / Math.max(units, 1), label: allSisters === 1 ? 'Sister' : 'Sisters (' + allSisters + ')', count: allSisters, isAsabah: true };
                    }
                    residual = 0;
                }
            }

            const result = {};
            for (const [key, s] of Object.entries(shares)) {
                if (s.amount !== undefined) {
                    result[key] = { ...s };
                } else if (s.fraction !== undefined && !s.isAsabah) {
                    result[key] = { ...s, amount: netEstate * s.fraction };
                }
            }

            const distributed = Object.values(result).reduce((s, x) => s + (x.amount || 0), 0);
            let unclaimed = netEstate - distributed;
            if (unclaimed > 0.5) {
                const raddEligible = Object.entries(result).filter(([k]) => k !== 'spouse');
                const raddBase = raddEligible.reduce((s, [, v]) => s + (v.amount || 0), 0);
                if (raddBase > 0) {
                    for (const [key] of raddEligible) {
                        result[key].amount += unclaimed * (result[key].amount / raddBase);
                        result[key].raddApplied = true;
                    }
                    unclaimed = 0;
                }
            }
            const finalDistributed = Object.values(result).reduce((s, x) => s + (x.amount || 0), 0);
            return { shares: result, distributed: finalDistributed, unclaimed: Math.max(0, netEstate - finalDistributed - 0.01) };
        };

        function FaraidCalculator({ selectedProfile, theme, settings, calcData, saveCalcForProfile }) {
                const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Legend } = window.Recharts || {};
                const _RC = !!window.Recharts;
            const _t = { text: theme.text, textSec: theme.textSec, surface: theme.surface, border: theme.border };

                const [calcStep, setCalcStep] = useState(1);
                const [assets, setAssets] = useState([]);
                const [showAssetForm, setShowAssetForm] = useState(false);
                const [newAsset, setNewAsset] = useState({ name: '', category: 'property', value: '' });
                const [editAssetIdx, setEditAssetIdx] = useState(null);
                const [debts, setDebts] = useState([]);
                const [showDebtForm, setShowDebtForm] = useState(false);
                const [newDebt, setNewDebt] = useState({ description: '', amount: '' });
                const [funeralCost, setFuneralCost] = useState('');
                const [wasiyyahAmount, setWasiyyahAmount] = useState('');
                const [heirs, setHeirs] = useState({
                    spouseExists: false, spouseType: 'wife',
                    sons: 0, daughters: 0,
                    fatherAlive: false, motherAlive: false,
                    grandfatherAlive: false, grandmotherAlive: false,
                    fullBrothers: 0, fullSisters: 0,
                    paternalBrothers: 0, paternalSisters: 0
                });
                useEffect(() => {
                    if (selectedProfile && calcData && calcData[selectedProfile.id]) {
                        const sv = calcData[selectedProfile.id];
                        if (sv.assets) setAssets(sv.assets);
                        if (sv.debts) setDebts(sv.debts);
                        if (sv.funeralCost !== undefined) setFuneralCost(String(sv.funeralCost));
                        if (sv.wasiyyahAmount !== undefined) setWasiyyahAmount(String(sv.wasiyyahAmount));
                        if (sv.heirs) setHeirs(sv.heirs);
                    }
                }, []);
                useEffect(() => {
                    if (selectedProfile && saveCalcForProfile) saveCalcForProfile(selectedProfile.id, { assets, debts, funeralCost, wasiyyahAmount, heirs });
                }, [assets, debts, funeralCost, wasiyyahAmount, JSON.stringify(heirs)]);


                const sym = CURRENCIES[settings.currency]?.symbol || '£';
                const totalAssets = assets.reduce((s, a) => s + parseFloat(a.value || 0), 0);
                const totalDebts = debts.reduce((s, d) => s + parseFloat(d.amount || 0), 0);
                const funeral = parseFloat(funeralCost || 0);
                const netEstate = Math.max(0, totalAssets - totalDebts - funeral);
                const maxWasiyyah = netEstate / 3;
                const wasiyyah = Math.min(parseFloat(wasiyyahAmount || 0), maxWasiyyah);
                const distributionEstate = Math.max(0, netEstate - wasiyyah);
                const results = calcStep === 4 ? calculateFaraid(heirs, distributionEstate, settings.madhab) : null;

                const ASSET_CATS = ['Property', 'Cash & Bank', 'Investments', 'Business', 'Vehicle', 'Jewellery', 'Other'];
                const CHART_COLORS = ['#0d9488','#3b82f6','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316'];

                const fmt = (n) => `${sym}${Number(n || 0).toLocaleString('en-GB', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

                const chartData = results ? Object.entries(results.shares).map(([k, s]) => ({
                    name: s.label, value: parseFloat((s.amount || 0).toFixed(2))
                })).filter(d => d.value > 0) : [];

                const stepLabels = ['Assets', 'Debts & Wasiyyah', 'Heirs', 'Results'];

                const sectionCard = (content, mb = '1rem') => (
                    <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.25rem', marginBottom: mb, boxShadow: theme.shadow }}>
                        {content}
                    </div>
                );

                const counterRow = (label, key, min = 0) => (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.75rem 0', borderBottom: `1px solid ${theme.border}` }}>
                        <span style={{ color: theme.text, fontSize: '0.9rem' }}>{label}</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                            <button onClick={() => setHeirs(prev => ({ ...prev, [key]: Math.max(min, prev[key] - 1) }))} style={{ width: '2rem', height: '2rem', borderRadius: '50%', border: `2px solid ${theme.border}`, background: theme.surface, color: theme.text, cursor: 'pointer', fontSize: '1.1rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>−</button>
                            <span style={{ color: theme.text, fontWeight: 700, minWidth: '1.5rem', textAlign: 'center' }}>{heirs[key]}</span>
                            <button onClick={() => setHeirs(prev => ({ ...prev, [key]: prev[key] + 1 }))} style={{ width: '2rem', height: '2rem', borderRadius: '50%', border: 'none', background: theme.primary, color: 'white', cursor: 'pointer', fontSize: '1.1rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>+</button>
                        </div>
                    </div>
                );

                const toggleRow = (label, key, subtitle) => (
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0.75rem 0', borderBottom: `1px solid ${theme.border}` }}>
                        <div>
                            <span style={{ color: theme.text, fontSize: '0.9rem', display: 'block' }}>{label}</span>
                            {subtitle && <span style={{ color: theme.textSec, fontSize: '0.75rem' }}>{subtitle}</span>}
                        </div>
                        <button onClick={() => setHeirs(prev => ({ ...prev, [key]: !prev[key] }))} style={{ width: '3rem', height: '1.5rem', borderRadius: '1rem', border: 'none', background: heirs[key] ? theme.primary : theme.border, cursor: 'pointer', position: 'relative', transition: 'background 0.2s' }}>
                            <div style={{ position: 'absolute', top: '0.15rem', left: heirs[key] ? '1.6rem' : '0.15rem', width: '1.2rem', height: '1.2rem', borderRadius: '50%', background: 'white', transition: 'left 0.2s' }} />
                        </button>
                    </div>
                );

                // ── STEP 1: ASSETS ──
                const AssetsStep = () => (
                    <div>
                        <h2 style={{ color: theme.text, marginBottom: '0.5rem' }}>Estate Assets</h2>
                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1.5rem' }}>List all assets owned by the deceased at time of death.</p>

                        {assets.map((a, i) => (
                            <div key={i} style={{ background: theme.surface, borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', boxShadow: theme.shadow, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                                <div>
                                    <p style={{ color: theme.text, fontWeight: 600, margin: 0, fontSize: '0.9rem' }}>{a.name}</p>
                                    <p style={{ color: theme.textSec, fontSize: '0.75rem', margin: 0 }}>{a.category}</p>
                                </div>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                    <span style={{ color: theme.primary, fontWeight: 700 }}>{fmt(a.value)}</span>
                                    <button onClick={() => { setNewAsset(a); setEditAssetIdx(i); setShowAssetForm(true); }} style={{ background: 'none', border: 'none', cursor: 'pointer', color: theme.textSec, fontSize: '1rem' }}>✏️</button>
                                    <button onClick={() => setAssets(prev => prev.filter((_, idx) => idx !== i))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#ef4444', fontSize: '1rem' }}>🗑️</button>
                                </div>
                            </div>
                        ))}

                        {showAssetForm ? (
                            <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.25rem', marginBottom: '1rem', boxShadow: theme.shadow }}>
                                <h3 style={{ color: theme.text, fontSize: '1rem', marginBottom: '1rem' }}>{editAssetIdx !== null ? 'Edit Asset' : 'Add Asset'}</h3>
                                <div style={{ marginBottom: '1rem' }}>
                                    <label style={{ color: theme.text }}>Asset Name</label>
                                    <input value={newAsset.name} onChange={e => setNewAsset(prev => ({ ...prev, name: e.target.value }))} placeholder="e.g. Family Home, Savings Account" style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                                </div>
                                <div style={{ marginBottom: '1rem' }}>
                                    <label style={{ color: theme.text }}>Category</label>
                                    <select value={newAsset.category} onChange={e => setNewAsset(prev => ({ ...prev, category: e.target.value }))} style={{ background: theme.surface, color: theme.text, borderColor: theme.border }}>
                                        {ASSET_CATS.map(c => <option key={c} value={c}>{c}</option>)}
                                    </select>
                                </div>
                                <div style={{ marginBottom: '1.25rem' }}>
                                    <label style={{ color: theme.text }}>Value ({sym})</label>
                                    <input type="number" value={newAsset.value} onChange={e => setNewAsset(prev => ({ ...prev, value: e.target.value }))} placeholder="0.00" min="0" style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                                </div>
                                <div style={{ display: 'flex', gap: '0.75rem' }}>
                                    <button onClick={() => {
                                        if (!newAsset.name || !newAsset.value) return;
                                        if (editAssetIdx !== null) {
                                            setAssets(prev => prev.map((a, i) => i === editAssetIdx ? newAsset : a));
                                            setEditAssetIdx(null);
                                        } else {
                                            setAssets(prev => [...prev, newAsset]);
                                        }
                                        setNewAsset({ name: '', category: 'property', value: '' });
                                        setShowAssetForm(false);
                                    }} style={{ flex: 1, background: theme.primary, color: 'white', border: 'none', padding: '0.75rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600 }}>Save</button>
                                    <button onClick={() => { setShowAssetForm(false); setEditAssetIdx(null); setNewAsset({ name: '', category: 'property', value: '' }); }} style={{ flex: 1, background: theme.border, color: theme.text, border: 'none', padding: '0.75rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600 }}>Cancel</button>
                                </div>
                            </div>
                        ) : (
                            <button onClick={() => setShowAssetForm(true)} style={{ width: '100%', background: theme.primary, color: 'white', border: 'none', padding: '0.875rem', borderRadius: '0.75rem', cursor: 'pointer', fontWeight: 600, fontSize: '0.9rem', marginBottom: '1.5rem' }}>+ Add Asset</button>
                        )}

                        {assets.length > 0 && (
                            <div style={{ background: `linear-gradient(135deg, ${theme.primary}15 0%, ${theme.primary}05 100%)`, border: `1px solid ${theme.primary}40`, borderRadius: '0.75rem', padding: '1rem', marginBottom: '1.5rem' }}>
                                <p style={{ color: theme.textSec, fontSize: '0.75rem', margin: '0 0 0.25rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>Total Gross Estate</p>
                                <p style={{ color: theme.primary, fontSize: '1.75rem', fontWeight: 700, margin: 0 }}>{fmt(totalAssets)}</p>
                            </div>
                        )}
                    </div>
                );

                // ── STEP 2: DEBTS & WASIYYAH ──
                const DebtsStep = () => (
                    <div>
                        <h2 style={{ color: theme.text, marginBottom: '0.5rem' }}>Debts & Deductions</h2>
                        <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1.5rem' }}>Deducted before distribution. Order: Funeral → Debts → Wasiyyah (max ⅓).</p>

                        {sectionCard(<>
                            <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '1rem' }}>🕌 Funeral Expenses</h3>
                            <div>
                                <label style={{ color: theme.text }}>Estimated Cost ({sym})</label>
                                <input type="number" value={funeralCost} onChange={e => setFuneralCost(e.target.value)} placeholder="0.00" min="0" style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                            </div>
                        </>)}

                        {sectionCard(<>
                            <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '1rem' }}>💳 Debts & Liabilities</h3>
                            {debts.map((d, i) => (
                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '0.5rem 0', borderBottom: `1px solid ${theme.border}` }}>
                                    <span style={{ color: theme.text, fontSize: '0.875rem' }}>{d.description}</span>
                                    <div style={{ display: 'flex', gap: '0.75rem', alignItems: 'center' }}>
                                        <span style={{ color: '#ef4444', fontWeight: 600 }}>−{fmt(d.amount)}</span>
                                        <button onClick={() => setDebts(prev => prev.filter((_, idx) => idx !== i))} style={{ background: 'none', border: 'none', cursor: 'pointer', color: '#ef4444' }}>✕</button>
                                    </div>
                                </div>
                            ))}
                            {showDebtForm ? (
                                <div style={{ marginTop: '1rem' }}>
                                    <div style={{ marginBottom: '0.75rem' }}>
                                        <label style={{ color: theme.text }}>Description</label>
                                        <input value={newDebt.description} onChange={e => setNewDebt(prev => ({ ...prev, description: e.target.value }))} placeholder="e.g. Mortgage, Loan, Credit card" style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                                    </div>
                                    <div style={{ marginBottom: '0.75rem' }}>
                                        <label style={{ color: theme.text }}>Amount ({sym})</label>
                                        <input type="number" value={newDebt.amount} onChange={e => setNewDebt(prev => ({ ...prev, amount: e.target.value }))} placeholder="0.00" min="0" style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                                    </div>
                                    <div style={{ display: 'flex', gap: '0.5rem' }}>
                                        <button onClick={() => { if (!newDebt.description || !newDebt.amount) return; setDebts(prev => [...prev, newDebt]); setNewDebt({ description: '', amount: '' }); setShowDebtForm(false); }} style={{ flex: 1, background: theme.primary, color: 'white', border: 'none', padding: '0.6rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600 }}>Add</button>
                                        <button onClick={() => setShowDebtForm(false)} style={{ flex: 1, background: theme.border, color: theme.text, border: 'none', padding: '0.6rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600 }}>Cancel</button>
                                    </div>
                                </div>
                            ) : (
                                <button onClick={() => setShowDebtForm(true)} style={{ marginTop: '0.75rem', background: 'none', border: `1px dashed ${theme.border}`, width: '100%', padding: '0.6rem', borderRadius: '0.5rem', cursor: 'pointer', color: theme.textSec, fontSize: '0.875rem' }}>+ Add Debt</button>
                            )}
                        </>)}

                        {sectionCard(<>
                            <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '0.5rem' }}>📜 Wasiyyah (Bequest)</h3>
                            <p style={{ color: theme.textSec, fontSize: '0.75rem', marginBottom: '0.75rem' }}>Maximum ⅓ of net estate after debts and funeral. Max: {fmt(maxWasiyyah)}</p>
                            <div>
                                <label style={{ color: theme.text }}>Bequest Amount ({sym})</label>
                                <input type="number" value={wasiyyahAmount} onChange={e => setWasiyyahAmount(e.target.value)} placeholder="0.00" min="0" max={maxWasiyyah} style={{ background: theme.surface, color: theme.text, borderColor: theme.border }} />
                            </div>
                            {parseFloat(wasiyyahAmount) > maxWasiyyah && (
                                <p style={{ color: '#f59e0b', fontSize: '0.75rem', marginTop: '0.5rem' }}>⚠️ Exceeds ⅓ limit. Will be capped at {fmt(maxWasiyyah)}.</p>
                            )}
                        </>)}

                        <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.25rem', boxShadow: theme.shadow }}>
                            <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '1rem' }}>Estate Summary</h3>
                            {[
                                { label: 'Gross Estate', value: totalAssets, color: theme.primary },
                                { label: '− Funeral Costs', value: -funeral, color: '#ef4444' },
                                { label: '− Total Debts', value: -totalDebts, color: '#ef4444' },
                                { label: '= Net Estate', value: netEstate, color: theme.text, bold: true },
                                { label: '− Wasiyyah', value: -wasiyyah, color: '#f59e0b' },
                                { label: '= For Distribution', value: distributionEstate, color: '#10b981', bold: true },
                            ].map((row, i) => (
                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '0.4rem 0', borderBottom: i < 5 ? `1px solid ${theme.border}` : 'none' }}>
                                    <span style={{ color: theme.textSec, fontSize: '0.875rem', fontWeight: row.bold ? 700 : 400 }}>{row.label}</span>
                                    <span style={{ color: row.color, fontWeight: row.bold ? 700 : 600, fontSize: row.bold ? '1rem' : '0.875rem' }}>{fmt(Math.abs(row.value))}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                );

                // ── STEP 3: HEIRS ──
                const HeirsStep = () => {
                    const hasChildren = heirs.sons > 0 || heirs.daughters > 0;
                    const sibsBlocked = hasChildren || heirs.fatherAlive || heirs.grandfatherAlive;
                    const madhab = MADHABS.find(m => m.value === settings.madhab);

                    return (
                        <div>
                            <h2 style={{ color: theme.text, marginBottom: '0.5rem' }}>Heirs (Waratha)</h2>
                            <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '0.5rem' }}>Select all living heirs at time of death. Madhab: <strong style={{ color: theme.primary }}>{madhab?.name}</strong></p>

                            {sectionCard(<>
                                <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 700, marginBottom: '0.5rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>💍 Spouse</h3>
                                {toggleRow('Has surviving spouse', 'spouseExists')}
                                {heirs.spouseExists && (
                                    <div style={{ paddingTop: '0.75rem', display: 'flex', gap: '0.75rem' }}>
                                        {['wife', 'husband'].map(t => (
                                            <button key={t} onClick={() => setHeirs(prev => ({ ...prev, spouseType: t }))} style={{ flex: 1, padding: '0.5rem', borderRadius: '0.5rem', border: `2px solid ${heirs.spouseType === t ? theme.primary : theme.border}`, background: heirs.spouseType === t ? `${theme.primary}15` : theme.surface, color: heirs.spouseType === t ? theme.primary : theme.textSec, cursor: 'pointer', fontWeight: 600, fontSize: '0.875rem', textTransform: 'capitalize' }}>{t}</button>
                                        ))}
                                    </div>
                                )}
                            </>)}

                            {sectionCard(<>
                                <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 700, marginBottom: '0.5rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>👶 Children</h3>
                                {counterRow('Sons', 'sons')}
                                {counterRow('Daughters', 'daughters')}
                            </>)}

                            {sectionCard(<>
                                <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 700, marginBottom: '0.5rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>👨‍👩‍👦 Parents</h3>
                                {toggleRow('Father is alive', 'fatherAlive')}
                                {toggleRow('Mother is alive', 'motherAlive')}
                            </>)}

                            {sectionCard(<>
                                <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 700, marginBottom: '0.5rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>👴 Grandparents</h3>
                                <p style={{ color: theme.textSec, fontSize: '0.75rem', marginBottom: '0.5rem' }}>Only relevant when parents are not alive.</p>
                                {toggleRow('Paternal grandfather', 'grandfatherAlive', heirs.fatherAlive ? 'Excluded (father alive)' : '')}
                                {toggleRow('Maternal grandmother', 'grandmotherAlive', heirs.motherAlive ? 'Excluded (mother alive)' : '')}
                            </>)}

                            {sectionCard(<>
                                <h3 style={{ color: theme.text, fontSize: '0.875rem', fontWeight: 700, marginBottom: '0.5rem', textTransform: 'uppercase', letterSpacing: '0.05em' }}>👥 Siblings</h3>
                                {sibsBlocked && (
                                    <div style={{ background: '#fef3c715', border: '1px solid #fbbf2440', borderRadius: '0.5rem', padding: '0.6rem', marginBottom: '0.75rem' }}>
                                        <p style={{ color: '#92400e', fontSize: '0.75rem', margin: 0 }}>⚠️ Siblings are excluded when {hasChildren ? 'children' : heirs.fatherAlive ? 'father' : 'grandfather'} are alive.</p>
                                    </div>
                                )}
                                <div style={{ opacity: sibsBlocked ? 0.4 : 1, pointerEvents: sibsBlocked ? 'none' : 'auto' }}>
                                    {counterRow('Full brothers', 'fullBrothers')}
                                    {counterRow('Full sisters', 'fullSisters')}
                                    {counterRow('Paternal half-brothers', 'paternalBrothers')}
                                    {counterRow('Paternal half-sisters', 'paternalSisters')}
                                </div>
                            </>)}
                        </div>
                    );
                };

                // ── STEP 4: RESULTS ──
                const ResultsStep = () => {
                    if (!results) return (
                        <div style={{ textAlign: 'center', padding: '3rem 1rem' }}>
                            <p style={{ color: theme.textSec, fontSize: '1rem' }}>Please add assets and at least one heir to calculate distribution.</p>
                        </div>
                    );

                    const totalDistributed = Object.values(results.shares).reduce((s, h) => s + (h.amount || 0), 0);

                    return (
                        <div>
                            <h2 style={{ color: theme.text, marginBottom: '0.5rem' }}>Faraid Distribution</h2>
                            <p style={{ color: theme.textSec, fontSize: '0.875rem', marginBottom: '1.5rem' }}>
                                Based on {MADHABS.find(m => m.value === settings.madhab)?.name} madhab. Estate for distribution: <strong style={{ color: theme.primary }}>{fmt(distributionEstate)}</strong>
                            </p>

                            {/* Summary cards */}
                            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.75rem', marginBottom: '1.5rem' }}>
                                {[
                                    { label: 'Gross Estate', value: totalAssets, icon: '🏦' },
                                    { label: 'Deductions', value: totalDebts + funeral + wasiyyah, icon: '📉' },
                                    { label: 'For Distribution', value: distributionEstate, icon: '⚖️' },
                                    { label: 'Distributed', value: totalDistributed, icon: '✅' },
                                ].map((c, i) => (
                                    <div key={i} style={{ background: theme.surface, borderRadius: '0.75rem', padding: '1rem', boxShadow: theme.shadow, textAlign: 'center' }}>
                                        <div style={{ fontSize: '1.5rem', marginBottom: '0.25rem' }}>{c.icon}</div>
                                        <p style={{ color: theme.primary, fontWeight: 700, fontSize: '1rem', margin: '0 0 0.25rem' }}>{fmt(c.value)}</p>
                                        <p style={{ color: theme.textSec, fontSize: '0.7rem', margin: 0 }}>{c.label}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Pie Chart */}
                            {chartData.length > 0 && _RC && (
                                <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.25rem', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                                    <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '1rem' }}>Distribution Breakdown</h3>
                                    <ResponsiveContainer width="100%" height={220}>
                                        <PieChart>
                                            <Pie data={chartData} cx="50%" cy="50%" outerRadius={85} dataKey="value" label={({ name, percent }) => `${name} ${(percent * 100).toFixed(0)}%`} labelLine={false} fontSize={11}>
                                                {chartData.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                                            </Pie>
                                            <Tooltip formatter={(val) => fmt(val)} />
                                        </PieChart>
                                    </ResponsiveContainer>
                                </div>
                            )}

                            {/* Bar Chart */}
                            {chartData.length > 0 && _RC && (
                                <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.25rem', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                                    <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, marginBottom: '1rem' }}>Share Amounts</h3>
                                    <ResponsiveContainer width="100%" height={200}>
                                        <BarChart data={chartData} margin={{ top: 5, right: 10, left: 10, bottom: 5 }}>
                                            <XAxis dataKey="name" tick={{ fontSize: 11, fill: theme.textSec }} />
                                            <YAxis tick={{ fontSize: 10, fill: theme.textSec }} tickFormatter={v => `${sym}${(v/1000).toFixed(0)}k`} />
                                            <Tooltip formatter={(val) => [fmt(val), 'Amount']} />
                                            <Bar dataKey="value" radius={[4, 4, 0, 0]}>
                                                {chartData.map((_, i) => <Cell key={i} fill={CHART_COLORS[i % CHART_COLORS.length]} />)}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            )}

                            {/* Detailed table */}
                            <div style={{ background: theme.surface, borderRadius: '1rem', overflow: 'hidden', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                                <div style={{ padding: '1rem 1.25rem', borderBottom: `1px solid ${theme.border}` }}>
                                    <h3 style={{ color: theme.text, fontSize: '0.9rem', fontWeight: 700, margin: 0 }}>Heir Details</h3>
                                </div>
                                <div style={{ overflowX: 'auto' }}>
                                    <table style={{ width: '100%', borderCollapse: 'collapse' }}>
                                        <thead>
                                            <tr style={{ background: theme.bg }}>
                                                {['Heir', 'Basis', 'Share', 'Amount', 'Per Person'].map(h => (
                                                    <th key={h} style={{ padding: '0.6rem 1rem', color: theme.textSec, fontSize: '0.75rem', textAlign: 'left', fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{h}</th>
                                                ))}
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {Object.entries(results.shares).map(([key, s], i) => {
                                                const amt = s.amount || 0;
                                                const pct = distributionEstate > 0 ? (amt / distributionEstate * 100).toFixed(1) : 0;
                                                const perPerson = s.count > 0 ? amt / s.count : amt;
                                                const basis = s.isAsabah ? 'Asabah (Residual)' : s.fraction ? `Fard (${s.fraction < 1 ? ['', '½', '⅓', '¼', '⅙', '⅛'][Math.round(1/s.fraction)] || (s.fraction*100).toFixed(0)+'%' : s.fraction*100+'%'})` : '—';
                                                return (
                                                    <tr key={key} style={{ borderTop: `1px solid ${theme.border}`, background: i % 2 === 0 ? theme.surface : theme.bg }}>

                            {results.unclaimed > 1 && (

                                    <p style={{ color: '#92400e', fontSize: '0.8rem', margin: 0 }}>Returned to estate. Consult a qualified Islamic scholar for ruling on radd (return).</p>

                            <div style={{ background: `${theme.primary}10`, border: `1px solid ${theme.primary}30`, borderRadius: '0.75rem', padding: '1rem' }}>
                                <p style={{ color: theme.primary, fontWeight: 600, margin: '0 0 0.25rem', fontSize: '0.875rem' }}>📚 Scholarly Disclaimer</p>
                                <p style={{ color: theme.textSec, fontSize: '0.75rem', margin: 0, lineHeight: 1.6 }}>This calculator provides a general Faraid estimate based on classical Sunni Fiqh. Individual cases may differ due to circumstances such as non-Muslim heirs, adopted children, or contested estates. Always consult a qualified Islamic scholar (Mufti) and a solicitor for your specific situation.</p>

                                const shareRows = Object.entries(results.shares).map(function(entry) {
                                    const s = entry[1]; const amt = s.amount || 0;

                                    const pp = s.count > 1 ? fmt(amt/s.count) : '-';
                                    return '<tr><td>' + s.label + '</td><td>' + (s.isAsabah ? 'Asabah' : 'Fard') + '</td><td>' + pct + '%</td><td>' + fmt(amt) + '</td><td>' + pp + '</td></tr>';

                                const totalDist = fmt(Object.values(results.shares).reduce(function(a,x){ return a+(x.amount||0); }, 0));
                                const w = window.open('', '_blank');
                                if (!w) { alert('Please allow popups for this site to print reports.'); return; }
                                const html = ['<!DOCTYPE html><html><head><title>Faraid Report</title>',
                                    '<meta charset="UTF-8"><style>body{font-family:Georgia,serif;max-width:800px;margin:0 auto;padding:2rem}h1,h2{color:#0d9488}table{width:100%;border-collapse:collapse;margin-bottom:1.5rem}th{background:#0d9488;color:#fff;padding:.5rem .75rem;text-align:left}td{padding:.5rem .75rem;border-bottom:1px solid #e5e5ea}.tot td{font-weight:700;background:#f0fdf4}.disc{background:#f0fdf4;padding:1rem;border-radius:.5rem;font-size:.85rem;margin-top:1rem}.foot{text-align:center;font-size:.75rem;color:#86868b;margin-top:2rem}@media print{button{display:none}}</style></head><body>',
                                    '<h1>Faraid Report — ' + pName + '</h1><p>' + madhName + ' madhab &bull; ' + today + '</p>',

                                    '<h2>Heir Distribution</h2><table><thead><tr><th>Heir</th><th>Basis</th><th>%</th><th>Amount</th><th>Per Person</th></tr></thead><tbody>' + shareRows + '</tbody><tr class="tot"><td colspan="3">Total</td><td>' + totalDist + '</td><td></td></tr></table>',
                                    '<div class="disc">Faraid estimate (' + madhName + ' school). Consult a qualified Mufti and solicitor.</div>',

                                ].join('');

                            }} style={{ width: '100%', background: theme.gradient, color: 'white', border: 'none', padding: '1rem', borderRadius: '0.75rem', cursor: 'pointer', fontSize: '1rem', fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem', marginTop: '1rem' }}>

                };

                return (
                    <div style={{ minHeight: '100vh', background: theme.bg, padding: '1.5rem 1rem' }}>
                        <div style={{ maxWidth: '42rem', margin: '0 auto' }}>
                            {selectedProfile && (
                                <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1rem', marginBottom: '1rem', boxShadow: theme.shadow }}>
                                    <p style={{ color: theme.textSec, fontSize: '0.875rem', margin: 0 }}>Calculating for: <strong style={{ color: theme.text }}>{selectedProfile.name}</strong> ({RELATIONSHIPS.find(r => r.value === selectedProfile.relationship)?.label})</p>
                                </div>
                            )}

                            {/* Step indicator */}
                            <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1rem 1.25rem', marginBottom: '1.5rem', boxShadow: theme.shadow }}>

                                    <div style={{ position: 'absolute', top: '1rem', left: '12%', right: '12%', height: '2px', background: theme.border, zIndex: 0 }} />
                                    {stepLabels.map((label, i) => {
                                        const step = i + 1;
                                        const done = step < calcStep;
                                        const active = step === calcStep;
                                        return (
                                            <div key={i} onClick={() => setCalcStep(step)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '0.4rem', cursor: 'pointer', zIndex: 1, flex: 1 }}>

                                                    {done ? '✓' : step}
                                                </div>
                                                <span style={{ fontSize: '0.65rem', color: active ? theme.primary : theme.textSec, fontWeight: active ? 700 : 400, textAlign: 'center' }}>{label}</span>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Step content */}
                            <div style={{ background: theme.surface, borderRadius: '1rem', padding: '1.5rem', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                                {calcStep === 1 && AssetsStep()}
                                {calcStep === 2 && DebtsStep()}
                                {calcStep === 3 && HeirsStep()}
                                {calcStep === 4 && ResultsStep()}
                            </div>

                            {/* Navigation */}
                            <div style={{ display: 'flex', gap: '1rem' }}>
                                {calcStep > 1 && (
                                    <button onClick={() => setCalcStep(s => s - 1)} style={{ flex: 1, background: theme.border, color: theme.text, border: 'none', padding: '1rem', borderRadius: '0.75rem', cursor: 'pointer', fontSize: '1rem', fontWeight: 600 }}>← Back</button>
                                )}
                                {calcStep < 4 && (
                                    <button onClick={() => setCalcStep(s => s + 1)} style={{ flex: 1, background: theme.gradient, color: 'white', border: 'none', padding: '1rem', borderRadius: '0.75rem', cursor: 'pointer', fontSize: '1rem', fontWeight: 600 }}>
                                        {calcStep === 3 ? '⚖️ Calculate' : 'Next →'}
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            };

        function MyLegacy({ cryptoKey, initialData, onNewKey }) {
            const [currentView, setCurrentView] = useState('home');
            const [darkMode, setDarkMode] = useState(false);
            const [profiles, setProfiles] = useState([]);
            const [selectedProfile, setSelectedProfile] = useState(null);
            const [showAddProfile, setShowAddProfile] = useState(false);
            const [newProfile, setNewProfile] = useState({ name: '', relationship: 'self', dob: '' });
            const [settings, setSettings] = useState({ madhab: 'hanafi', currency: 'GBP', jurisdiction: 'england-wales' });
            const DEFAULT_WILL = {
                personal: { fullName: '', dob: '', address: '', postcode: '', nationalId: '', maritalStatus: '' },
                islamic: { shariaCompliance: true, shahada: 'I bear witness that there is no god but Allah, and Muhammad is the Messenger of Allah.', burial: 'muslim-cemetery', burialLocation: '', shroud: 'Simple white cloth (Kafan)', timeline: 'As soon as possible after death', janazah: 'According to Sunnah', notes: '', obligations: { hajj: false, hajjDetails: '', zakah: false, zakahDetails: '', qard: false, qardDetails: '', kaffarah: false, kaffarahDetails: '', other: '' } },
                executors: [], guardians: [], arbiters: [],
                wasiyyah: { enabled: false, amount: '', beneficiary: '', purpose: '' },
                waqf: { enabled: false, amount: '', purpose: '', beneficiaries: '' },
                signatures: { testator: null, witness1: { sig: null, name: '', address: '' }, witness2: { sig: null, name: '', address: '' } }
            };
            const [willsData, setWillsData] = useState({});
            const [willData, setWillData]   = useState(DEFAULT_WILL);
            const [willStep, setWillStep] = useState(1);
            const [editingProfileId, setEditingProfileId] = useState(null);
            const [editProfileData, setEditProfileData] = useState({ name: '', relationship: 'self', dob: '' });
            const [calcData, setCalcData]   = useState({});
            // Change password state
            const [cpCurrent, setCpCurrent] = useState('');
            const [cpNew, setCpNew]         = useState('');
            const [cpConfirm, setCpConfirm] = useState('');
            const [cpMsg, setCpMsg]         = useState('');
            const [cpBusy, setCpBusy]       = useState(false);
            const [cpDone, setCpDone]       = useState(false);
            const importRef = useRef(null);
            
            const theme = {
                primary: darkMode ? '#14b8a6' : '#0d9488',
                gradient: darkMode ? 'linear-gradient(135deg, #14b8a6 0%, #2dd4bf 100%)' : 'linear-gradient(135deg, #0d9488 0%, #14b8a6 100%)',
                bg: darkMode ? '#000000' : '#f5f5f7',
                surface: darkMode ? '#1c1c1e' : '#ffffff',
                text: darkMode ? '#f5f5f7' : '#1d1d1f',
                textSec: darkMode ? '#98989d' : '#86868b',
                border: darkMode ? '#38383a' : '#e5e5ea',
                shadow: darkMode ? '0 2px 8px rgba(0,0,0,0.3)' : '0 2px 8px rgba(0,0,0,0.08)'
            };
            const _t = { text: theme.text, textSec: theme.textSec, surface: theme.surface, border: theme.border };
            
            // Initialise state from decrypted data provided by PinGate
            useEffect(() => {
                if (!initialData) return;
                try {
                    if (initialData.profiles) setProfiles(initialData.profiles);
                    if (initialData.settings) setSettings(s => ({ ...s, ...initialData.settings }));
                    if (typeof initialData.darkMode === 'boolean') setDarkMode(initialData.darkMode);
                    if (initialData.willsData) setWillsData(initialData.willsData);
                    if (initialData.calcData)  setCalcData(initialData.calcData);
                } catch(e) { console.error('Init error:', e); }
            }, []);
            
            // Encrypted save — runs whenever data changes
            useEffect(() => {
                if (!cryptoKey) return;
                (async () => {
                    try { await saveEncrypted(cryptoKey, { profiles, settings, darkMode, willsData, calcData }); }
                    catch(e) { console.error('Save error:', e); }
                })();
            }, [profiles, settings, darkMode, willsData, calcData]);
            
            const addProfile = () => {
                if (!newProfile.name) { alert('Please enter a name'); return; }
                setProfiles([...profiles, { ...newProfile, id: Date.now() }]);
                setNewProfile({ name: '', relationship: 'self', dob: '' });
                setShowAddProfile(false);
            };
            
            const startWillFor = (profile) => {
                setSelectedProfile(profile);
                setWillData(willsData[profile.id] || { ...DEFAULT_WILL, personal: { ...DEFAULT_WILL.personal, fullName: profile.name } });
                setWillStep(1);
                setCurrentView('will');
            };
            
            const startCalcFor = (profile) => {
                setSelectedProfile(profile);
                setCurrentView('calculator');
            };

            // Per-profile will save
            const saveWillForProfile = (pid, data) => setWillsData(prev => ({ ...prev, [pid]: data }));
            const saveCalcForProfile = (pid, d)    => setCalcData(prev => ({ ...prev, [pid]: d }));

            const updateProfile = () => {
                if (!editProfileData.name) return;
                setProfiles(prev => prev.map(p => p.id === editingProfileId ? { ...p, ...editProfileData } : p));
                setEditingProfileId(null);
            };

            // Change password
            const changePassword = async () => {
                if (cpNew.length < 4) return setCpMsg('New password must be at least 4 characters');
                if (cpNew !== cpConfirm) return setCpMsg('New passwords do not match');
                setCpBusy(true); setCpMsg('');
                try {
                    const salt = b642buf(localStorage.getItem(ML_SALT_KEY));
                    const oldKey = await deriveCryptoKey(cpCurrent, salt);
                    const enc = JSON.parse(localStorage.getItem(ML_DATA_KEY));
                    await decryptBlob(oldKey, enc); // verify current password
                    const newSalt = crypto.getRandomValues(new Uint8Array(16));
                    localStorage.setItem(ML_SALT_KEY, buf2b64(newSalt.buffer));
                    const newKey = await deriveCryptoKey(cpNew, newSalt);
                    await saveEncrypted(newKey, { profiles, settings, darkMode, willsData, calcData });
                    onNewKey(newKey);
                    setCpCurrent(''); setCpNew(''); setCpConfirm('');
                    setCpDone(true); setCpBusy(false);
                    setTimeout(() => setCpDone(false), 3000);
                } catch(e) { setCpMsg('Current password is incorrect.'); setCpBusy(false); }
            };

            // Export encrypted backup
            const exportData = () => {
                const salt = localStorage.getItem(ML_SALT_KEY);
                const enc  = localStorage.getItem(ML_DATA_KEY);
                if (!salt || !enc) return alert('No data to export.');
                const blob = new Blob([JSON.stringify({ salt, enc: JSON.parse(enc) })], { type: 'application/json' });
                const url  = URL.createObjectURL(blob);
                const a    = document.createElement('a');
                a.href = url;
                a.download = 'mylegacy_backup_' + new Date().toISOString().split('T')[0] + '.json';
                a.click(); URL.revokeObjectURL(url);
            };

            // Import encrypted backup
            const importData = (file) => {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = e => {
                    try {
                        const { salt, enc } = JSON.parse(e.target.result);
                        localStorage.setItem(ML_SALT_KEY, salt);
                        localStorage.setItem(ML_DATA_KEY, JSON.stringify(enc));
                        localStorage.setItem(ML_READY_KEY, '1');
                        alert('Backup imported successfully!\n\nThe app will reload. Use the password from the source device to log in.');
                        window.location.reload();
                    } catch(e) { alert('Invalid backup file. Please use a .json file exported from My Legacy.'); }
                };
                reader.readAsText(file);
            };

            
            const Header = () => (
                <div style={{ background: theme.surface, borderBottom: `1px solid ${theme.border}`, padding: '1rem' }}>
                    <div style={{ maxWidth: '42rem', margin: '0 auto', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

                            <div><h1 style={{ color: theme.text, fontSize: '1.25rem', fontWeight: 600, margin: 0 }}>My Legacy</h1><p style={{ color: theme.textSec, fontSize: '0.75rem', margin: '0.25rem 0 0 0' }}>Islamic Estate Planner</p></div>
                        </div>
                        <button onClick={() => setDarkMode(!darkMode)} style={{ background: theme.surface, border: `1px solid ${theme.border}`, width: '2.5rem', height: '2.5rem', borderRadius: '50%', cursor: 'pointer', fontSize: '1.25rem', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{darkMode ? '☀️' : '🌙'}</button>
                    </div>
                </div>
            );
            

            const HomePage = () => (
                <div style={{ minHeight: '100vh', background: theme.bg }}>
                    <div style={{ maxWidth: '42rem', margin: '0 auto', padding: '1.5rem 1rem' }}>
                        <div style={{ background: theme.gradient, borderRadius: '1.5rem', padding: '2rem', color: 'white', marginBottom: '1.5rem', boxShadow: theme.shadow }}>
                            <img src={LOGO_PATH} alt="My Legacy" style={{ width: '4rem', height: '4rem', marginBottom: '1rem', borderRadius: '0.75rem' }} onError={(e) => { e.target.style.display = 'none'; }} />
                            <h2 style={{ fontSize: '1.5rem', fontWeight: 'bold', margin: '0 0 0.5rem 0' }}>Plan Your Islamic Estate</h2>
                            <p style={{ fontSize: '0.875rem', opacity: 0.9, margin: 0 }}>Create Shariah-compliant wills and calculate inheritance distribution</p>
                        </div>
                        
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', marginBottom: '1.5rem', overflow: 'hidden' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}` }}><p style={{ color: theme.textSec, fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', margin: 0 }}>SETTINGS</p></div>
                            <button onClick={() => setCurrentView('settings')} style={{ background: theme.surface, border: 'none', width: '100%', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}>
                                    <div style={{ background: 'linear-gradient(135deg, #7c3aed 0%, #a78bfa 100%)', width: '2.75rem', height: '2.75rem', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '1.25rem' }}>⚙️</div>
                                    <div style={{ textAlign: 'left' }}><p style={{ color: theme.text, fontWeight: 600, fontSize: '0.875rem', margin: 0 }}>Preferences</p><p style={{ color: theme.textSec, fontSize: '0.75rem', margin: 0 }}>{CURRENCIES[settings.currency].flag} {settings.currency} • {MADHABS.find(m => m.value === settings.madhab)?.name}</p></div>
                                </div>
                                <span style={{ color: theme.textSec }}>›</span>
                            </button>
                        </div>
                        
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', marginBottom: '1.5rem', overflow: 'hidden' }}>

                                <button onClick={() => setShowAddProfile(true)} style={{ color: theme.primary, background: 'none', border: 'none', fontSize: '0.875rem', fontWeight: 600, cursor: 'pointer', padding: '0.25rem 0.5rem' }}>Add</button>
                            </div>
                            
                            {showAddProfile && (
                                <div style={{ background: theme.bg, padding: '1rem', borderBottom: `1px solid ${theme.border}` }}>

                                        <button onClick={() => {setShowAddProfile(false); setNewProfile({ name: '', relationship: 'self', dob: '' });}} style={{ flex: 1, background: theme.border, color: theme.text, border: 'none', padding: '0.75rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600 }}>Cancel</button>

                                        </div>

                                            <button onClick={() => confirm('Delete ' + p.name + '?') && setProfiles(profiles.filter(x => x.id !== p.id))} style={{ color: theme.textSec, background: 'none', border: 'none', cursor: 'pointer', padding: '0.5rem', fontSize: '1.25rem' }}>🗑️</button>
                                        </div>
                                    </div>
                                    {editingProfileId === p.id && (
                                        <div style={{ background: theme.bg, borderRadius: '0.75rem', padding: '1rem', marginBottom: '0.75rem', border: '2px solid ' + theme.primary + '40' }}>
                                            <p style={{ color: theme.primary, fontWeight: 700, fontSize: '0.875rem', margin: '0 0 0.75rem' }}>Edit Profile</p>
                                            <div style={{ marginBottom: '0.75rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem' }}>Name</label><input value={editProfileData.name} onChange={e => setEditProfileData(prev => ({...prev, name: e.target.value}))} style={{ background: theme.surface, color: theme.text, border: '1px solid ' + theme.border, width: '100%', padding: '0.5rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem', boxSizing: 'border-box' }} /></div>
                                            <div style={{ marginBottom: '0.75rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem' }}>Relationship</label><select value={editProfileData.relationship} onChange={e => setEditProfileData(prev => ({...prev, relationship: e.target.value}))} style={{ background: theme.surface, color: theme.text, border: '1px solid ' + theme.border, width: '100%', padding: '0.5rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem' }}>{RELATIONSHIPS.map(r => <option key={r.value} value={r.value}>{r.label}</option>)}</select></div>
                                            <div style={{ marginBottom: '1rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem' }}>Date of Birth</label><input type='date' value={editProfileData.dob} onChange={e => setEditProfileData(prev => ({...prev, dob: e.target.value}))} style={{ background: theme.surface, color: theme.text, border: '1px solid ' + theme.border, width: '100%', padding: '0.5rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem', boxSizing: 'border-box' }} /></div>
                                            <div style={{ display: 'flex', gap: '0.5rem' }}><button onClick={updateProfile} style={{ flex: 1, background: theme.primary, color: 'white', border: 'none', padding: '0.6rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600, fontSize: '0.875rem' }}>Save</button><button onClick={() => setEditingProfileId(null)} style={{ flex: 1, background: theme.border, color: theme.text, border: 'none', padding: '0.6rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600, fontSize: '0.875rem' }}>Cancel</button></div>
                                        </div>
                                    )}
                                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '0.5rem' }}>
                                        <button onClick={() => startWillFor(p)} style={{ background: 'linear-gradient(135deg, #0ea5e9 0%, #3b82f6 100%)', color: 'white', border: 'none', padding: '0.75rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}>
                                            {willsData && willsData[p.id] && willsData[p.id].personal && willsData[p.id].personal.fullName ? '✏️ Edit Will' : '📝 Create Will'}
                                        </button>
                                        <button onClick={() => startCalcFor(p)} style={{ background: 'linear-gradient(135deg, #10b981 0%, #22c55e 100%)', color: 'white', border: 'none', padding: '0.75rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontSize: '0.875rem', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '0.5rem' }}>
                                            {calcData && calcData[p.id] && calcData[p.id].assets && calcData[p.id].assets.length > 0 ? '✏️ Edit Estate' : '🧮 Calculate'}
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div style={{ textAlign: 'center', padding: '1rem 0' }}><p style={{ color: theme.textSec, fontSize: '0.75rem' }}>© 2026 My Legacy • Shariah-compliant estate planning</p></div>
                    </div>
                </div>
            );
            
            const SettingsPage = () => (
                <div style={{ minHeight: '100vh', background: theme.bg }}>
                    <div style={{ maxWidth: '42rem', margin: '0 auto', padding: '1.5rem 1rem' }}>
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', marginBottom: '1.5rem', overflow: 'hidden' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}` }}><p style={{ color: theme.textSec, fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', margin: 0 }}>CURRENCY</p></div>
                            {Object.entries(CURRENCIES).map(([code, details], idx) => (
                                <button key={code} onClick={() => details.enabled && setSettings(prev => ({...prev, currency: code}))} disabled={!details.enabled} style={{ background: theme.surface, border: 'none', borderTop: idx > 0 ? `1px solid ${theme.border}` : 'none', width: '100%', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: details.enabled ? 'pointer' : 'not-allowed', opacity: details.enabled ? 1 : 0.5 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><span style={{ fontSize: '1.5rem' }}>{details.flag}</span><div style={{ textAlign: 'left' }}><p style={{ color: theme.text, fontWeight: 600, fontSize: '0.875rem', margin: 0 }}>{details.name}</p><p style={{ color: theme.textSec, fontSize: '0.75rem', margin: 0 }}>{code}</p></div></div>
                                    {settings.currency === code && <span style={{ color: theme.primary, fontSize: '1.25rem' }}>✓</span>}
                                </button>
                            ))}
                        </div>
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', marginBottom: '1.5rem', overflow: 'hidden' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}` }}><p style={{ color: theme.textSec, fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', margin: 0 }}>MADHAB</p></div>
                            {MADHABS.map((m, idx) => (
                                <button key={m.value} onClick={() => setSettings(prev => ({...prev, madhab: m.value}))} style={{ background: theme.surface, border: 'none', borderTop: idx > 0 ? `1px solid ${theme.border}` : 'none', width: '100%', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: 'pointer' }}>
                                    <div style={{ textAlign: 'left' }}><p style={{ color: theme.text, fontWeight: 600, fontSize: '0.875rem', margin: 0 }}>{m.name}</p><p style={{ color: theme.textSec, fontSize: '0.75rem', margin: 0 }}>{m.description}</p></div>
                                    {settings.madhab === m.value && <span style={{ color: theme.primary, fontSize: '1.25rem' }}>✓</span>}
                                </button>
                            ))}
                        </div>
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', overflow: 'hidden' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}` }}><p style={{ color: theme.textSec, fontSize: '0.75rem', fontWeight: 600, textTransform: 'uppercase', margin: 0 }}>JURISDICTION</p></div>
                            {JURISDICTIONS.map((j, idx) => (
                                <button key={j.value} onClick={() => j.enabled && setSettings(prev => ({...prev, jurisdiction: j.value}))} disabled={!j.enabled} style={{ background: theme.surface, border: 'none', borderTop: idx > 0 ? `1px solid ${theme.border}` : 'none', width: '100%', padding: '1rem', display: 'flex', alignItems: 'center', justifyContent: 'space-between', cursor: j.enabled ? 'pointer' : 'not-allowed', opacity: j.enabled ? 1 : 0.5 }}>
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '0.75rem' }}><span style={{ fontSize: '1.5rem' }}>{j.country}</span><p style={{ color: theme.text, fontWeight: 600, fontSize: '0.875rem', margin: 0, textAlign: 'left' }}>{j.name}</p></div>
                                    {settings.jurisdiction === j.value && <span style={{ color: theme.primary, fontSize: '1.25rem' }}>✓</span>}
                                </button>
                            ))}
                        </div>
                    </div>

                        {/* ── Security ── */}
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', overflow: 'hidden', marginBottom: '1rem' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}`, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <span>🔐</span>
                                <h3 style={{ color: theme.text, fontWeight: 700, fontSize: '0.9rem', margin: 0 }}>Security — Change Password</h3>
                            </div>
                            <div style={{ padding: '1rem' }}>
                                {cpDone && <div style={{ background: '#f0fdf4', border: '1px solid #86efac', borderRadius: '0.5rem', padding: '0.6rem 0.875rem', marginBottom: '0.875rem' }}><p style={{ color: '#166534', fontSize: '0.875rem', margin: 0 }}>✅ Password changed successfully!</p></div>}
                                <div style={{ marginBottom: '0.75rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem', fontWeight: 600 }}>Current Password</label><input type='password' value={cpCurrent} onChange={e => setCpCurrent(e.target.value)} placeholder='Enter current password' style={{ background: theme.bg, color: theme.text, border: `1px solid ${theme.border}`, width: '100%', padding: '0.6rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem', boxSizing: 'border-box' }} /></div>
                                <div style={{ marginBottom: '0.75rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem', fontWeight: 600 }}>New Password</label><input type='password' value={cpNew} onChange={e => setCpNew(e.target.value)} placeholder='Minimum 4 characters' style={{ background: theme.bg, color: theme.text, border: `1px solid ${theme.border}`, width: '100%', padding: '0.6rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem', boxSizing: 'border-box' }} /></div>
                                <div style={{ marginBottom: '0.875rem' }}><label style={{ color: theme.text, fontSize: '0.875rem', display: 'block', marginBottom: '0.25rem', fontWeight: 600 }}>Confirm New Password</label><input type='password' value={cpConfirm} onChange={e => setCpConfirm(e.target.value)} placeholder='Repeat new password' style={{ background: theme.bg, color: theme.text, border: `1px solid ${theme.border}`, width: '100%', padding: '0.6rem 0.75rem', borderRadius: '0.5rem', fontSize: '0.875rem', boxSizing: 'border-box' }} /></div>
                                {cpMsg && <p style={{ color: '#dc2626', fontSize: '0.8rem', marginBottom: '0.75rem' }}>{cpMsg}</p>}
                                <button onClick={changePassword} disabled={cpBusy} style={{ background: cpBusy ? theme.border : theme.primary, color: 'white', border: 'none', padding: '0.6rem 1.25rem', borderRadius: '0.5rem', cursor: cpBusy ? 'not-allowed' : 'pointer', fontWeight: 600, fontSize: '0.875rem' }}>
                                    {cpBusy ? '⏳ Changing…' : '🔐 Change Password'}
                                </button>
                            </div>
                        </div>

                        {/* ── Data Management ── */}
                        <div style={{ background: theme.surface, boxShadow: theme.shadow, borderRadius: '1rem', overflow: 'hidden', marginBottom: '1rem' }}>
                            <div style={{ padding: '0.75rem 1rem', borderBottom: `1px solid ${theme.border}`, display: 'flex', alignItems: 'center', gap: '0.5rem' }}>
                                <span>💾</span>
                                <h3 style={{ color: theme.text, fontWeight: 700, fontSize: '0.9rem', margin: 0 }}>Data Management</h3>
                            </div>
                            <div style={{ padding: '1rem' }}>
                                <p style={{ color: theme.textSec, fontSize: '0.8rem', marginBottom: '1rem', lineHeight: 1.5 }}>
                                    Export your encrypted backup to transfer to another device. Import restores data — you will need the original password.
                                </p>
                                <div style={{ display: 'flex', gap: '0.75rem', flexWrap: 'wrap' }}>
                                    <button onClick={exportData} style={{ flex: 1, minWidth: '130px', background: theme.primary, color: 'white', border: 'none', padding: '0.7rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600, fontSize: '0.875rem' }}>
                                        ⬇️ Export Backup
                                    </button>
                                    <button onClick={() => importRef.current && importRef.current.click()} style={{ flex: 1, minWidth: '130px', background: theme.surface, color: theme.primary, border: `2px solid ${theme.primary}`, padding: '0.7rem 1rem', borderRadius: '0.5rem', cursor: 'pointer', fontWeight: 600, fontSize: '0.875rem' }}>
                                        ⬆️ Import Backup
                                    </button>
                                    <input ref={importRef} type='file' accept='.json' style={{ display: 'none' }} onChange={e => importData(e.target.files[0])} />
                                </div>
                                <div style={{ background: '#fffbeb', border: '1px solid #fcd34d', borderRadius: '0.5rem', padding: '0.75rem', marginTop: '0.875rem', fontSize: '0.78rem', color: '#92400e', lineHeight: 1.5 }}>
                                    ⚠️ Exported files are AES-256 encrypted. You need your password to access them on another device.
                                </div>
                            </div>
                        </div>
                </div>
            );
            
            // ─────────────────────────────────────────────────────────────
            // PHASE 3: FARAID INHERITANCE CALCULATOR
            // ─────────────────────────────────────────────────────────────

            // Faraid calculation engine (classical Sunni Fiqh)

            return (
                <div style={{ minHeight: '100vh', background: theme.bg }}>
                    {Header()}
                    {currentView === 'home' && HomePage()}
                    {currentView === 'settings' && SettingsPage()}
                    {currentView === 'will' && (
                        <WillCreator
                            willData={willData} setWillData={setWillData}
                            willStep={willStep} setWillStep={setWillStep}
                            selectedProfile={selectedProfile} theme={theme}
                            settings={settings}
                            saveWillForProfile={saveWillForProfile}
                        />
                    )}
                    {currentView === 'calculator' && (
                        <FaraidCalculator
                            selectedProfile={selectedProfile} theme={theme}
                            settings={settings} calcData={calcData}
                            saveCalcForProfile={saveCalcForProfile}
                        />
                    )}
                </div>
            );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        console.log('✅ My Legacy Phase 3 - Faraid Calculator loaded!');
    </script>
</body>
</html>
